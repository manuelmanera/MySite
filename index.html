<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Design Deep Dark */
        body { 
            background-color: #0a0a0a; 
            color: #d1d1d1; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .navbar { background-color: #121212; border-bottom: 1px solid #282828; }
        .hero { background: #0f0f0f; padding: 70px 0; border-bottom: 1px solid #1f1f1f; }
        
        /* Banner con rapporto 720:300 */
        .project-banner { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 720 / 300; 
            object-fit: cover; 
            background-color: #000; 
        }

        .project-card { 
            background-color: #161616; 
            border: 1px solid #2a2a2a; 
            border-radius: 10px; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }
        .project-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            border-color: #3f3f3f;
        }

        .card-title { color: #ffffff; font-weight: 600; letter-spacing: 0.5px; }
        .text-muted { color: #7a7a7a !important; }

        #adminPanel { 
            display: none; 
            background: #1c1c1c; 
            color: #fff; 
            border-radius: 8px; 
            padding: 30px; 
            margin-bottom: 40px; 
            border: 1px solid #ffc107;
        }

        .form-control { 
            background-color: #222; 
            border: 1px solid #333; 
            color: #fff; 
        }
        .form-control:focus { 
            background-color: #2a2a2a; 
            border-color: #ffc107; 
            color: #fff; 
            box-shadow: none;
        }

        .btn-primary { background-color: #2962ff; border: none; font-weight: 500; }
        .btn-warning { font-weight: 700; color: #000; }
        
        .status-msg { display: none; color: #ffc107; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <span class="navbar-brand fw-bold">MANUEL</span>
            <button class="btn btn-outline-warning btn-sm" onclick="apriGestione()">Accesso</button>
        </div>
    </nav>

    <header class="hero text-center">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">Project Hub</h1>
            <p class="text-muted">Raccolta dei lavori e delle applicazioni web.</p>
        </div>
    </header>

    <div class="container py-5">
        <div id="adminPanel">
            <h5 class="mb-4 text-uppercase fw-bold text-warning">Inserimento Progetto</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="small text-muted">Nome</label>
                    <input type="text" id="pTitle" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">URL</label>
                    <input type="text" id="pLink" class="form-control" placeholder="https://...">
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Immagine (720x300)</label>
                    <input type="file" id="pImgFile" class="form-control" accept="image/*">
                </div>
                <div class="col-md-2">
                    <label class="small text-muted">Descrizione</label>
                    <input type="text" id="pDesc" class="form-control">
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-warning w-100 fw-bold" id="btnSalva" onclick="pubblica()">+</button>
                </div>
            </div>
            <div id="loader" class="status-msg text-center">Trasferimento dati al server...</div>
            <div class="mt-4 border-top border-secondary pt-3">
                <button class="btn btn-sm btn-outline-secondary" onclick="chiudiGestione()">Esci</button>
            </div>
        </div>

        <main id="containerLavori" class="row g-4"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAu6exLNfCQ8D5U8yzYtZXKMlX2BELyQMI",
            authDomain: "sito-manuel-75af9.firebaseapp.com",
            databaseURL: "https://sito-manuel-75af9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-manuel-75af9",
            storageBucket: "sito-manuel-75af9.firebasestorage.app",
            messagingSenderId: "967465800949",
            appId: "1:967465800949:web:77accc2685ac8f2126e1bc"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        const CHIAVE_IMGBB = "b2bd2cbba6ca0679055dc317aa5bf613";

        window.modalitaAdmin = false;

        // Funzione di validazione tramite Firebase
        window.apriGestione = async () => {
            const passInserita = prompt("Credenziali richieste:");
            if (!passInserita) return;

            try {
                const snapshot = await get(child(ref(db), 'config/password'));
                if (snapshot.exists() && passInserita === snapshot.val()) {
                    window.modalitaAdmin = true;
                    document.getElementById('adminPanel').style.display = 'block';
                    mostraContenuti();
                } else {
                    alert("Credenziali non valide.");
                }
            } catch (e) {
                alert("Errore di rete.");
            }
        };

        window.chiudiGestione = () => {
            window.modalitaAdmin = false;
            document.getElementById('adminPanel').style.display = 'none';
            mostraContenuti();
        };

        window.pubblica = async () => {
            const t = document.getElementById('pTitle').value;
            const u = document.getElementById('pLink').value;
            const d = document.getElementById('pDesc').value;
            const f = document.getElementById('pImgFile').files[0];

            if (!t || !u || !f) return alert("Inserire i dati richiesti.");

            document.getElementById('loader').style.display = 'block';
            document.getElementById('btnSalva').disabled = true;

            const form = new FormData();
            form.append("image", f);

            try {
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${CHIAVE_IMGBB}`, { method: "POST", body: form });
                const json = await imgRes.json();

                if (json.success) {
                    await push(ref(db, 'progetti'), {
                        titolo: t,
                        link: u,
                        testo: d,
                        copertina: json.data.url
                    });
                    document.getElementById('pTitle').value = '';
                    document.getElementById('pLink').value = '';
                    document.getElementById('pDesc').value = '';
                    document.getElementById('pImgFile').value = '';
                }
            } catch (err) { alert("Errore nel processo."); }
            finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('btnSalva').disabled = false;
            }
        };

        window.rimuovi = (id) => {
            if (confirm("Confermare l'eliminazione definitiva?")) {
                remove(ref(db, `progetti/${id}`));
            }
        };

        function mostraContenuti() {
            onValue(ref(db, 'progetti'), (snapshot) => {
                const griglia = document.getElementById('containerLavori');
                griglia.innerHTML = '';
                snapshot.forEach((dato) => {
                    const val = dato.val();
                    const chiave = dato.key;
                    griglia.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card h-100 project-card shadow-lg">
                                ${window.modalitaAdmin ? `<button class="btn btn-danger btn-sm position-absolute end-0 m-2 shadow" onclick="rimuovi('${chiave}')">Rimuovi</button>` : ''}
                                <img src="${val.copertina}" class="project-banner">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title mb-2 text-uppercase">${val.titolo}</h5>
                                    <p class="text-muted small flex-grow-1">${val.testo}</p>
                                    <a href="${val.link}" target="_blank" class="btn btn-primary w-100 mt-3 py-2">Visualizza</a>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        mostraContenuti();
    </script>
</body>
</html>
